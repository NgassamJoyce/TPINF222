<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Blog</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #f5f5f5; }
        .navbar { background: #333; padding: 12px 20px; border-radius: 8px; margin-bottom: 30px; }
        .navbar a { color: white; text-decoration: none; margin-right: 20px; font-size: 16px; }
        .navbar a:hover { color: #f0a500; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .card h2 { margin: 0 0 10px; color: #333; }
        .card p { color: #555; }
        .badge { background: #e0f0ff; color: #0066cc; padding: 3px 10px; border-radius: 20px; font-size: 13px; margin-right: 5px; }
        .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-edit { background: #f0a500; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-detail { background: #3498db; color: white; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <h1>📰 Tous les articles</h1>

    <form th:action="@{/blog}" method="get" style="margin-bottom: 20px; display:flex; gap:10px;">
      <input 
        type="text" 
        name="keyword" 
        th:value="${keyword}"
        placeholder="🔍 Rechercher par titre ou catégorie..."
        style="flex:1; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px;"
       />
      <button type="submit" 
        style="background:#3498db; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-size:15px;">
        Rechercher
      </button>
    <!-- Bouton reset si une recherche est active -->
      <a th:if="${keyword}" href="/blog"
        style="background:#95a5a6; color:white; padding:10px 15px; border-radius:6px; text-decoration:none; font-size:15px;">
        ✕ Effacer
      </a>
 </form>

<!-- Message résultat de recherche -->
    <p th:if="${keyword}" style="color:#3498db;">
        Résultats pour : <strong th:text="${keyword}"></strong>
    </p>

<!-- Message si aucun résultat -->
    <p th:if="${#lists.isEmpty(articles)}" style="color:gray;">
       Aucun article trouvé.
    </p>

    <!-- Message si aucun article -->
    <p th:if="${#lists.isEmpty(articles)}" style="color:gray;">Aucun article pour le moment.</p>

    <!-- Boucle sur les articles -->
    <div class="card" th:each="article : ${articles}">
        <h2 th:text="${article.title}">Titre</h2>
        <p th:text="${article.contain}">Contenu...</p>
        <div>
            <span class="badge" th:text="${article.category}">Catégorie</span>
            <span class="badge" th:text="${article.tags}">Tag</span>
            <small style="color:gray;" th:text="'Par ' + ${article.autor}">Auteur</small>
        </div>
        <br>
        <a class="btn btn-detail" th:href="@{/blog/{id}(id=${article.id})}">👁 Voir</a>
        <a class="btn btn-edit"   th:href="@{/blog/edit/{id}(id=${article.id})}">✏️ Modifier</a>
        <a class="btn btn-delete" th:href="@{/blog/delete/{id}(id=${article.id})}"
           onclick="return confirm('Supprimer cet article ?')">🗑️ Supprimer</a>
    </div>
</body>
</html>
